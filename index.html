<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぎょぴちゃん はんていマシン</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --coral:#ff7a8a; --amber:#ffc93c; --sky:#5ec5ff; --mint:#4fd1b5; --violet:#b794f6; --ink:#38415a; --ink-soft:#8a93ab; --line:#eef1f7; }
    html, body { height:100%; }
    body {
      font-family:'Hiragino Maru Gothic ProN','Rounded Mplus 1c','Quicksand',system-ui,sans-serif;
      background:#f7f9fc;
      background-image:
        radial-gradient(ellipse at 8% 0%,#ffe3ec 0%,transparent 40%),
        radial-gradient(ellipse at 92% 6%,#d8f3ff 0%,transparent 38%),
        radial-gradient(ellipse at 50% 100%,#d6fff0 0%,transparent 45%),
        radial-gradient(ellipse at 88% 96%,#fff4d6 0%,transparent 40%);
      color:var(--ink); height:100vh; overflow:hidden; display:flex; flex-direction:column;
    }
    @keyframes floatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes popIn { 0%{transform:scale(0.85);opacity:0} 65%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
    @keyframes titleBounce { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }

    /* ── ウェルカム(初回だけ) ── */
    .welcome { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:#f7f9fc;
      background-image:radial-gradient(ellipse at 12% 0%,#ffe3ec 0%,transparent 42%),radial-gradient(ellipse at 88% 100%,#d8f3ff 0%,transparent 42%),radial-gradient(ellipse at 50% 60%,#fff4d6 0%,transparent 55%);
      transition:opacity 0.5s ease; }
    .welcome.hide { opacity:0; pointer-events:none; }
    .welcome-inner { text-align:center; animation:popIn 0.6s both; padding:1rem; }
    .welcome .fish-mark { width:120px; height:120px; margin:0 auto 1rem; animation:floatBob 3s ease-in-out infinite; }
    .welcome h1 { font-size:clamp(2rem,7vw,3rem); font-weight:800; background:linear-gradient(100deg,var(--coral),var(--amber) 35%,var(--mint) 65%,var(--sky)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .welcome .subtitle { color:var(--ink-soft); font-size:1.05rem; margin:0.6rem 0 2.2rem; }
    .w-start { font-size:1.3rem; font-weight:800; color:#fff; font-family:inherit; background:linear-gradient(120deg,var(--coral),var(--amber)); border:none; border-radius:99px; padding:1rem 3rem; cursor:pointer; box-shadow:0 10px 30px rgba(255,122,138,0.4),0 2px 0 #ec5e70; transition:all 0.2s; }
    .w-start:hover { transform:translateY(-2px); box-shadow:0 14px 38px rgba(255,122,138,0.5),0 2px 0 #ec5e70; }

    /* ── トップバー(細い1行) ── */
    .topbar { flex:0 0 auto; display:flex; align-items:center; gap:0.7rem; width:100%; max-width:1200px; margin:0 auto; padding:0.6rem 1.1rem; }
    .tb-logo { font-size:1.5rem; line-height:1; }
    .tb-title { font-weight:800; font-size:1rem; color:var(--ink); white-space:nowrap; }
    .tb-spacer { flex:1 1 auto; }
    .tb-group { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; justify-content:flex-end; }
    .lang-toggle { display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:99px; padding:3px; gap:3px; box-shadow:0 2px 8px rgba(56,65,90,0.1); }
    .lang-btn { border:none; background:transparent; padding:0.3rem 0.7rem; border-radius:99px; font-weight:800; font-size:0.76rem; color:var(--ink-soft); cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .lang-btn.active { background:#eef1f7; color:var(--ink); }
    .mode-toggle { display:flex; background:#eef1f7; border-radius:99px; padding:3px; gap:3px; }
    .mode-btn { border:none; background:transparent; padding:0.35rem 0.85rem; border-radius:99px; font-weight:800; font-size:0.8rem; color:var(--ink-soft); cursor:pointer; font-family:inherit; transition:all 0.2s; white-space:nowrap; }
    .mode-btn.active { background:#fff; color:var(--ink); box-shadow:0 2px 8px rgba(56,65,90,0.12); }
    .mode-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .model-badge { display:inline-block; font-size:0.74rem; font-weight:800; padding:0.3rem 0.8rem; border-radius:99px; background:#eef1f7; color:var(--ink); white-space:nowrap; }
    .reset-bundle-btn { font-size:0.7rem; font-weight:700; padding:0.3rem 0.7rem; border-radius:99px; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer; font-family:inherit; }
    .reset-bundle-btn:hover { border-color:var(--coral); color:var(--coral); }
    .nav-link { color:var(--ink); font-size:0.74rem; font-weight:800; text-decoration:none; background:#f3fffb; border:2px solid var(--mint); border-radius:99px; padding:0.3rem 0.85rem; white-space:nowrap; }
    .nav-link:hover { background:#e8fff8; }

    /* ── ダッシュボード(1画面グリッド) ── */
    .dashboard { flex:1 1 auto; min-height:0; display:grid; grid-template-columns:minmax(0,1.4fr) minmax(0,1fr); grid-template-rows:1fr 1fr; gap:0.9rem; width:100%; max-width:1200px; margin:0 auto; padding:0 1.1rem 1rem; }
    .panel { position:relative; background:#fff; border-radius:22px; padding:1.3rem; box-shadow:0 10px 34px rgba(56,65,90,0.09); border:1px solid var(--line); overflow-y:auto; min-height:0; }
    .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,var(--coral),var(--amber),var(--mint),var(--sky),var(--violet)); border-radius:22px 22px 0 0; }
    .panel-judge { grid-column:1; grid-row:1 / 3; }
    .panel-map { grid-column:2; grid-row:1; }
    .panel-analysis { grid-column:2; grid-row:2; }
    @media (max-width:860px) {
      body { height:auto; overflow:auto; }
      .dashboard { grid-template-columns:1fr; grid-template-rows:auto; }
      .panel-judge,.panel-map,.panel-analysis { grid-column:1; grid-row:auto; }
    }

    /* ── 判定パネル ── */
    .upload-area { border:2.5px dashed #d8deea; border-radius:18px; padding:1.8rem 1.2rem; text-align:center; cursor:pointer; background:#fbfcfe; transition:all 0.25s; }
    .upload-area:hover, .upload-area.dragover { border-color:var(--mint); background:#f3fffb; box-shadow:0 0 0 5px rgba(79,209,181,0.10); }
    .upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-area { position:relative; }
    .upload-icon { font-size:2.6rem; margin-bottom:0.3rem; display:block; animation:floatBob 2.4s ease-in-out infinite; }
    .upload-text { color:var(--ink-soft); font-size:0.9rem; line-height:1.7; }

    #preview-wrap { display:none; text-align:center; }
    #preview-wrap-inner { position:relative; display:inline-block; max-width:100%; }
    #preview { max-width:100%; max-height:min(340px,40vh); border-radius:16px; box-shadow:0 8px 28px rgba(56,65,90,0.16); object-fit:contain; display:block; border:4px solid #fff; }
    #heatmap-canvas { display:none; position:absolute; top:0; left:0; width:100%; height:100%; border-radius:12px; pointer-events:none; opacity:0.7; }
    .heatmap-info { margin-top:0.7rem; font-size:0.8rem; color:var(--ink-soft); }
    .heatmap-legend { margin-bottom:0.4rem; line-height:1.8; font-weight:700; color:var(--ink); }
    .heatmap-note { font-size:0.72rem; color:var(--ink-soft); line-height:1.6; background:#fbfcfe; border:1px solid var(--line); border-radius:10px; padding:0.5rem 0.7rem; margin-bottom:0.4rem; text-align:left; }
    .toggle-heatmap-btn { background:#fff; border:2px solid var(--line); color:var(--ink); border-radius:99px; padding:0.3rem 1rem; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:inherit; }

    #judge-btn { display:none; margin-top:1rem; width:100%; padding:0.95rem; font-size:1.15rem; font-weight:800; color:#fff; background:linear-gradient(120deg,var(--coral),var(--amber)); border:none; border-radius:99px; cursor:pointer; transition:all 0.2s; box-shadow:0 8px 22px rgba(255,122,138,0.40),0 2px 0 #ec5e70; font-family:inherit; }
    #judge-btn:hover { transform:translateY(-2px); } #judge-btn:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

    #result { display:none; text-align:center; margin-top:1rem; animation:popIn 0.45s both; }
    .result-badge { font-size:3.6rem; line-height:1; }
    .result-badge.yes { animation:wiggle 0.5s ease 0.3s both; }
    @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} 75%{transform:rotate(-4deg)} }
    .result-verdict { font-size:1.4rem; font-weight:800; margin-top:0.3rem; }
    .result-verdict.yes { color:var(--coral); } .result-verdict.maybe { color:#e6a700; } .result-verdict.no { color:var(--sky); }
    .meter-wrap { margin-top:1rem; background:#fbfcfe; border:1px solid var(--line); border-radius:16px; padding:0.9rem 1rem; }
    .meter-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.5rem; }
    .meter-title { font-size:0.8rem; font-weight:700; color:var(--ink-soft); }
    .meter-text { font-size:1rem; font-weight:800; color:var(--ink); }
    .bar-bg { background:#eef1f7; border-radius:99px; height:14px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:99px; width:0%; transition:width 0.9s cubic-bezier(.22,.68,0,1.2); background:linear-gradient(90deg,var(--amber),var(--coral)); }
    .bar-fill.mid { background:linear-gradient(90deg,#ffe08a,var(--amber)); } .bar-fill.low { background:linear-gradient(90deg,var(--sky),var(--violet)); }
    .percent-big { font-size:2.2rem; font-weight:800; margin-top:0.4rem; color:var(--ink); }
    .reset-btn { margin-top:1rem; background:#fff; border:2px solid var(--line); color:var(--ink-soft); border-radius:99px; padding:0.5rem 1.7rem; cursor:pointer; font-size:0.9rem; font-weight:700; font-family:inherit; }
    .reset-btn:hover { border-color:var(--coral); color:var(--coral); }
    #status { margin-top:0.9rem; font-size:0.82rem; color:var(--ink-soft); text-align:center; min-height:1.2em; }
    #status a { color:var(--coral); font-weight:700; }
    .loading-dots::after { content:''; animation:dots 1.2s steps(4,end) infinite; }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

    /* ── 地図パネル ── */
    .panel-title { font-weight:800; font-size:0.95rem; text-align:center; color:var(--ink); }
    .map-desc { font-size:0.76rem; color:var(--ink-soft); text-align:center; line-height:1.5; margin:0.3rem 0 0.7rem; }
    .make-map-btn { display:block; width:100%; padding:0.65rem; font-size:0.92rem; font-weight:800; color:#fff; font-family:inherit; background:linear-gradient(120deg,var(--mint),var(--sky)); border:none; border-radius:99px; cursor:pointer; box-shadow:0 5px 16px rgba(79,209,181,0.3); margin-bottom:0.6rem; }
    .make-map-btn:hover { transform:translateY(-2px); } .make-map-btn:disabled { opacity:0.55; cursor:not-allowed; transform:none; }
    .map-legend { display:flex; gap:1rem; justify-content:center; font-size:0.76rem; font-weight:700; margin-bottom:0.5rem; }
    .map-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }
    .network-wrap { position:relative; }
    #network { width:100%; height:260px; border:1px solid var(--line); border-radius:12px; background:#fbfcfe; }
    .map-spinner { display:none; position:absolute; inset:0; align-items:center; justify-content:center; pointer-events:none; }
    .map-spinner.show { display:flex; }
    .map-spinner::after { content:''; width:34px; height:34px; border:4px solid var(--line); border-top-color:var(--mint); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .map-status { font-size:0.76rem; color:var(--ink-soft); text-align:center; margin-top:0.5rem; min-height:1.1em; }
    .map-note { font-size:0.7rem; color:var(--ink-soft); line-height:1.55; margin-top:0.5rem; background:#fbfcfe; border:1px solid var(--line); border-radius:10px; padding:0.5rem 0.7rem; text-align:left; }

    /* ── 分析パネル ── */
    #judge-card { display:none; text-align:left; }
    .jc-title { font-weight:800; font-size:0.92rem; margin-bottom:0.7rem; color:var(--ink); text-align:center; }
    .jc-row { margin-bottom:0.55rem; padding:0.55rem 0.7rem; border:1px solid var(--line); border-radius:12px; background:#fff; transition:opacity 0.35s; }
    .jc-row.dim { opacity:0.38; } .jc-row.place { opacity:0.55; background:#fbfcfe; }
    .jc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.35rem; }
    .jc-name { font-weight:800; font-size:0.82rem; }
    .jc-eff { font-size:0.68rem; font-weight:800; padding:0.16rem 0.6rem; border-radius:99px; background:#eef1f7; color:var(--ink-soft); white-space:nowrap; }
    .jc-eff.strong { background:linear-gradient(90deg,var(--coral),var(--amber)); color:#fff; }
    .jc-bar-label { font-size:0.7rem; color:var(--ink-soft); margin-bottom:0.2rem; } .jc-bar-label b { color:var(--ink); }
    .jc-bar-bg { height:10px; background:#eef1f7; border-radius:99px; overflow:hidden; }
    .jc-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--mint),var(--sky)); width:0%; transition:width 0.8s cubic-bezier(.22,.68,0,1.2); }
    #brain-section { display:none; margin-top:1rem; }
    .brain-title { font-weight:800; font-size:0.9rem; text-align:center; color:var(--ink); margin-bottom:0.4rem; }
    .brain-canvas-wrap { position:relative; }
    #brain-canvas { width:100%; display:block; background:#fbfcfe; border:1px solid var(--line); border-radius:14px; }
    .brain-note-overlay { display:none; position:absolute; left:8px; right:8px; bottom:8px; font-size:0.66rem; line-height:1.5; color:var(--ink); background:rgba(255,255,255,0.88); border-radius:10px; padding:0.45rem 0.6rem; text-align:left; box-shadow:0 2px 8px rgba(56,65,90,0.12); }
    /* Material風ツールチップ */
    .brain-tip { display:none; position:absolute; transform:translate(-50%,-100%); background:rgba(48,56,80,0.96); color:#fff; font-size:0.74rem; font-weight:700; padding:0.32rem 0.65rem; border-radius:8px; white-space:nowrap; pointer-events:none; z-index:6; box-shadow:0 4px 14px rgba(0,0,0,0.28); }
    .brain-tip::after { content:''; position:absolute; left:50%; top:100%; transform:translateX(-50%); border:5px solid transparent; border-top-color:rgba(48,56,80,0.96); }
    #brain-canvas { cursor:default; }
    .brain-cap { font-size:0.7rem; color:var(--ink-soft); text-align:center; margin-top:0.35rem; line-height:1.55; }
    .analysis-hint { font-size:0.8rem; color:var(--ink-soft); text-align:center; padding:2rem 1rem; }
  </style>
</head>
<body>
  <!-- ウェルカム(初回だけ) -->
  <div class="welcome" id="welcome">
    <div class="welcome-inner">
      <svg class="fish-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="28" cy="34" rx="20" ry="14" fill="#5ec5ff"/>
        <ellipse cx="28" cy="34" rx="20" ry="14" fill="url(#g)" opacity="0.5"/>
        <path d="M48 34 L62 24 L60 34 L62 44 Z" fill="#ffc93c"/>
        <circle cx="20" cy="30" r="3.4" fill="#fff"/><circle cx="19" cy="31" r="1.7" fill="#38415a"/>
        <circle cx="36" cy="26" r="2" fill="#fff" opacity="0.8"/><circle cx="42" cy="40" r="1.4" fill="#fff" opacity="0.7"/>
        <defs><linearGradient id="g" x1="8" y1="20" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop stop-color="#4fd1b5"/><stop offset="1" stop-color="#b794f6"/></linearGradient></defs>
      </svg>
      <h1 id="w-title"></h1>
      <p class="subtitle" id="w-subtitle"></p>
      <button class="w-start" id="w-start" onclick="startApp()">▶ はじめる</button>
    </div>
  </div>

  <!-- トップバー -->
  <div class="topbar">
    <span class="tb-logo">🐟</span>
    <span class="tb-title" id="t-tb-title"></span>
    <span class="tb-spacer"></span>
    <span class="tb-group">
      <span class="mode-toggle" id="mode-toggle">
        <button class="mode-btn active" data-mode="A" onclick="setMode('A')" id="t-modeA"></button>
        <button class="mode-btn" data-mode="B" id="mode-btn-b" onclick="setMode('B')"></button>
      </span>
      <span class="lang-toggle">
        <button class="lang-btn" data-lang="kid" onclick="setLang('kid')">🧒 こども</button>
        <button class="lang-btn" data-lang="adult" onclick="setLang('adult')">🧑 おとな</button>
      </span>
      <span id="model-badge" class="model-badge"></span>
      <button id="switch-model-btn" class="reset-bundle-btn" onclick="switchModel()" style="display:none;"></button>
      <button id="reset-bundle-btn" class="reset-bundle-btn" onclick="resetToBundle()" style="display:none;"></button>
      <a href="train.html" class="nav-link" id="nav-link"></a>
    </span>
  </div>

  <!-- ダッシュボード -->
  <div class="dashboard">
    <!-- 左: 判定(メイン) -->
    <div class="panel panel-judge">
      <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept="image/*">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text" id="t-upload"></div>
      </div>
      <div id="preview-wrap">
        <div id="preview-wrap-inner">
          <img id="preview" src="" alt="preview">
          <canvas id="heatmap-canvas"></canvas>
        </div>
        <div class="heatmap-info" id="heatmap-info" style="display:none;">
          <div class="heatmap-legend" id="t-legend"></div>
          <button class="toggle-heatmap-btn" id="toggle-heatmap" onclick="toggleHeatmap()"></button>
        </div>
      </div>
      <button id="judge-btn" onclick="judge()"></button>
      <div id="result">
        <div class="result-badge" id="result-badge"></div>
        <div class="result-verdict" id="result-verdict"></div>
        <div class="meter-wrap">
          <div class="meter-top"><span class="meter-title" id="t-meter-title"></span><span class="meter-text" id="meter-text">―</span></div>
          <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
          <div class="percent-big" id="percent-big">0%</div>
        </div>
        <button class="reset-btn" onclick="reset()" id="t-reset"></button>
      </div>
      <div id="status"></div>
    </div>

    <!-- 右上: 地図 -->
    <div class="panel panel-map" id="panel-map" style="display:none;">
      <div class="panel-title" id="t-map-title"></div>
      <div class="map-desc" id="t-map-desc"></div>
      <div class="map-legend">
        <span><span class="map-dot" style="background:#ff7a8a;"></span><span id="t-map-yes"></span></span>
        <span><span class="map-dot" style="background:#5ec5ff;"></span><span id="t-map-no"></span></span>
      </div>
      <div class="network-wrap">
        <div id="network"></div>
        <div class="map-spinner" id="map-spinner"></div>
      </div>
      <div class="map-status" id="map-status"></div>
      <div class="map-note" id="t-map-note"></div>
    </div>

    <!-- 右下: 分析 -->
    <div class="panel panel-analysis">
      <div class="analysis-hint" id="analysis-hint"></div>
      <div id="judge-card">
        <div class="jc-title" id="t-jc-title"></div>
        <div id="jc-rows"></div>
        <div class="jc-row place">
          <div class="jc-head"><span class="jc-name" id="t-place-name"></span><span class="jc-eff" id="t-place-eff"></span></div>
          <div class="jc-bar-label" id="t-place-desc"></div>
        </div>
        <div class="heatmap-note" id="t-jc-note" style="margin-top:0.5rem;"></div>
      </div>
      <div id="brain-section">
        <div class="brain-title" id="brain-title"></div>
        <div class="brain-canvas-wrap">
          <canvas id="brain-canvas"></canvas>
          <div class="brain-note-overlay" id="brain-note-overlay"></div>
          <div class="brain-tip" id="brain-tip"></div>
        </div>
        <div class="brain-cap" id="brain-cap"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script>
    let classifier = null, featClassifier = null, mobileNetModel = null, gyopiAvg = null;
    let heatmapVisible = true, currentMode = 'A', resultShown = false, brainRAF = null;
    let usingOwnModel = false;
    let modelSet = { own: null, bundle: null };
    let currentSource = 'bundle';
    let curLang = localStorage.getItem('judge-lang') || 'kid';
    let last = null;

    const AXES = [
      { key:'warmth',      icon:'🔥', kid:'いろの あたたかさ', adult:'色の暖かさ' },

    function setMapStatus(m) { document.getElementById('map-status').textContent = m; }
    function loadImageURL(url) { return new Promise((res, rej) => { const i = new Image(); i.crossOrigin = 'anonymous'; i.onload = () => res(i); i.onerror = rej; i.src = url; }); }
    function makeThumb(img) { const S = 56, c = document.createElement('canvas'); c.width = c.height = S; const x = c.getContext('2d'), m = Math.min(img.width, img.height); x.drawImage(img, (img.width - m) / 2, (img.height - m) / 2, m, m, 0, 0, S, S); return c.toDataURL('image/jpeg', 0.72); }
    function cosine(a, b) { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9); }
    async function makeMap() {
      const sp = document.getElementById('map-spinner'); sp.classList.add('show');
      try {
        let items, embeddings;
        const cached = JSON.parse(localStorage.getItem('gyopi-map-data') || 'null');
        if (cached && cached.length) {
          // 学習時に保存された地図データ(即・計算なし)。自分の学習画像が反映される
          items = cached.map((d, i) => ({ yes: d.yes, thumb: d.thumb, f: '#' + (i + 1) }));
          embeddings = cached.map(d => d.emb);
        } else {
          // フォールバック: 同梱 training_data から その場で計算(重い)
          if (!mobileNetModel) mobileNetModel = await mobilenet.load({ version: 1, alpha: 0.25 });
          setMapStatus(L('mapStLoad'));
          const index = await fetch('training_data/index.json').then(r => r.json());
          items = [];
          for (const f of index['ぎょぴちゃん'] || []) items.push({ cls: 'ぎょぴちゃん', f, yes: true });
          for (const f of index['ぎょぴちゃんじゃない'] || []) items.push({ cls: 'ぎょぴちゃんじゃない', f, yes: false });
          embeddings = [];
          for (let i = 0; i < items.length; i++) {
            const url = `training_data/${items[i].cls}/${encodeURIComponent(items[i].f)}`;
            const img = await loadImageURL(url);
            items[i].thumb = makeThumb(img);
            const emb = tf.tidy(() => mobileNetModel.infer(img, true));
            embeddings.push(Array.from(await emb.data())); emb.dispose();
            setMapStatus(`${L('mapStEmb')} ${i + 1}/${items.length}`);
            await tf.nextFrame();
          }
        }
        const nodes = items.map((it, i) => ({ id: i, label: '', title: `${it.yes ? '🔴' : '🔵'} ${it.f}`, shape: 'circularImage', image: it.thumb, size: 18, borderWidth: 3, color: { background: '#ffffff', border: it.yes ? '#ff7a8a' : '#5ec5ff', highlight: { background: '#ffffff', border: it.yes ? '#ec5e70' : '#3aa8e8' } } }));
        setMapStatus(L('mapStLink'));
        const edgeSet = new Set(), edges = [];
        for (let i = 0; i < embeddings.length; i++) {
          const sims = [];
          for (let j = 0; j < embeddings.length; j++) if (i !== j) sims.push({ j, s: cosine(embeddings[i], embeddings[j]) });
          sims.sort((a, b) => b.s - a.s);
          for (let k = 0; k < 3 && k < sims.length; k++) { const j = sims[k].j, key = i < j ? `${i}-${j}` : `${j}-${i}`; if (!edgeSet.has(key)) { edgeSet.add(key); edges.push({ from: i, to: j }); } }
        }
        new vis.Network(document.getElementById('network'), { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, {
          nodes: { shape: 'dot', borderWidth: 2 }, edges: { color: { color: '#d8deea', highlight: '#ff7a8a' }, width: 0.6, smooth: false },
          physics: { barnesHut: { gravitationalConstant: -3500, centralGravity: 0.25, springLength: 90, springConstant: 0.04 }, stabilization: { iterations: 250 } },
          interaction: { hover: true, zoomView: true, dragView: true, tooltipDelay: 120 },
        });
        const y = items.filter(i => i.yes).length;
        setMapStatus(`${L('mapStDone')}（🔴${y} / 🔵${items.length - y}）`);
        sp.classList.remove('show');
      } catch (e) { setMapStatus('⚠️ ' + e.message); sp.classList.remove('show'); }
    }

    async function judgeMobileNet(img) {
      const btn = document.getElementById('judge-btn');

      renderHeatmap(img, occResult);

      document.getElementById('heatmap-canvas').style.display = 'block';
      document.getElementById('heatmap-info').style.display = 'block';
      document.getElementById('toggle-heatmap').textContent = L('hideMap');

    }

    async function judgeFeature(img) {
      const btn = document.getElementById('judge-btn');
      btn.disabled = true; btn.textContent = L('judging');
      const feat = analyzeImageFeatures(img);
      const vec = FEATURE_KEYS.map(k => feat[k]);
      const prob = tf.tidy(() => featClassifier.predict(tf.tensor2d([vec])).dataSync()[1]);
      const eps = 0.06;
      const effects = FEATURE_KEYS.map((k, idx) => {
        const up = vec.slice(); up[idx] = Math.min(1, up[idx] + eps);
        const dn = vec.slice(); dn[idx] = Math.max(0, dn[idx] - eps);
        const pu = tf.tidy(() => featClassifier.predict(tf.tensor2d([up])).dataSync()[1]);
        const pd = tf.tidy(() => featClassifier.predict(tf.tensor2d([dn])).dataSync()[1]);
        return Math.abs(pu - pd);
      });
      const effSum = effects.reduce((a, b) => a + b, 0) || 1;
      const effPct = effects.map(e => Math.round((e / effSum) * 100));
      const matchPct = FEATURE_KEYS.map(k => Math.round((1 - Math.abs(feat[k] - gyopiAvg[k])) * 100));
      last = { prob, matchPct, effPct, vec };
      showResult(prob);
      document.getElementById('heatmap-canvas').style.display = 'none';
      document.getElementById('heatmap-info').style.display = 'none';
      showJudgeCard(matchPct, effPct);
      renderBrainFeature(vec, prob, effPct);
      btn.disabled = false; btn.textContent = L('judge'); btn.style.display = 'none';
      resultShown = true;
      setStatus(L('stDoneB'));
    }

    function showJudgeCard(matchPct, effPct) {
      const maxEff = Math.max(...effPct, 1);
      AXES.forEach((a, i) => {
        document.getElementById('jc-match-' + i).textContent = matchPct[i] + '%';
        const effEl = document.getElementById('jc-eff-' + i);
        effEl.textContent = L('effPrefix') + effPct[i] + '%';
        effEl.className = 'jc-eff' + (effPct[i] > 0 && effPct[i] >= maxEff * 0.8 ? ' strong' : '');
        document.getElementById('jc-row-' + i).classList.toggle('dim', effPct[i] < maxEff * 0.35);
        setTimeout(() => { document.getElementById('jc-bar-' + i).style.width = matchPct[i] + '%'; }, 60);
      });
      document.getElementById('judge-card').style.display = 'block';
    }

    function analyzeImageFeatures(imgEl) {
      const S = 80;
      const canvas = document.createElement('canvas'); canvas.width = S; canvas.height = S;
      const ctx = canvas.getContext('2d'); ctx.drawImage(imgEl, 0, 0, S, S);
      const { data } = ctx.getImageData(0, 0, S, S);
      let warmSum = 0, brightSum = 0, satSum = 0;
      const hueHist = new Float32Array(12), gray = new Float32Array(S * S), n = S * S;
      for (let i = 0; i < n; i++) {
        const r = data[i*4]/255, g = data[i*4+1]/255, b = data[i*4+2]/255;
        gray[i] = (r + g + b) / 3;
        const max = Math.max(r,g,b), min = Math.min(r,g,b), l = (max+min)/2, d = max-min;
        const s = d === 0 ? 0 : d / (1 - Math.abs(2*l - 1));
        let h = 0;
        if (d !== 0) { if (max===r) h=((g-b)/d+6)%6*60; else if (max===g) h=((b-r)/d+2)*60; else h=((r-g)/d+4)*60; }
        warmSum += (h < 60 || h > 300) ? 1 : 0; brightSum += l; satSum += s;
        hueHist[Math.floor(h/30) % 12] += 1;
      }
      let edgeSum = 0;
      for (let y = 1; y < S-1; y++) for (let x = 1; x < S-1; x++) {
        const gx = -gray[(y-1)*S+(x-1)]+gray[(y-1)*S+(x+1)]-2*gray[y*S+(x-1)]+2*gray[y*S+(x+1)]-gray[(y+1)*S+(x-1)]+gray[(y+1)*S+(x+1)];
        const gy = -gray[(y-1)*S+(x-1)]-2*gray[(y-1)*S+x]-gray[(y-1)*S+(x+1)]+gray[(y+1)*S+(x-1)]+2*gray[(y+1)*S+x]+gray[(y+1)*S+(x+1)];
        edgeSum += Math.sqrt(gx*gx + gy*gy);
      }
      const hueNorm = Array.from(hueHist).map(v => v/n);
      return { warmth:warmSum/n, brightness:brightSum/n, saturation:satSum/n, edgeDensity:Math.min(edgeSum/((S-2)*(S-2)*0.5),1), hueVariety:hueNorm.filter(v=>v>0.03).length/12 };
    }

    function showResult(prob) {
      const pct = Math.round(prob * 100), x = LANG[curLang];
      const badgeEl = document.getElementById('result-badge'), verdictEl = document.getElementById('result-verdict');
      const meterEl = document.getElementById('meter-text'), bar = document.getElementById('bar-fill');
      let badge, cls, verdict, barClass;
      if (prob >= 0.55) { badge='🐟'; cls='yes'; verdict=x.verdict.yes; barClass=''; }
      else if (prob >= 0.45) { badge='🤔'; cls='maybe'; verdict=x.verdict.maybe; barClass='mid'; }
      else { badge='🙅'; cls='no'; verdict=x.verdict.no; barClass='low'; }
      let ci;
      if (prob >= 0.90) ci=5; else if (prob >= 0.70) ci=4; else if (prob >= 0.55) ci=3;
      else if (prob >= 0.45) ci=2; else if (prob >= 0.30) ci=1; else ci=0;
      badgeEl.textContent = badge; badgeEl.className = 'result-badge ' + cls;
      verdictEl.textContent = verdict; verdictEl.className = 'result-verdict ' + cls;
      meterEl.textContent = x.conf[ci];
      document.getElementById('percent-big').textContent = pct + '%';
      bar.className = 'bar-fill ' + barClass;
      setTimeout(() => { bar.style.width = pct + '%'; }, 50);
      document.getElementById('result').style.display = 'block';
    }

    async function computeOcclusionMap(img, baseProb, gridSize = 5) {
      const scores = [], offscreen = document.createElement('canvas');
      const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      offscreen.width = w; offscreen.height = h;
      const ctx = offscreen.getContext('2d'), cellW = w/gridSize, cellH = h/gridSize, tempImg = new Image();
      for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++) {
        ctx.drawImage(img, 0, 0, w, h); ctx.fillStyle = '#808080'; ctx.fillRect(col*cellW, row*cellH, cellW, cellH);
        await new Promise(r => { tempImg.onload = r; tempImg.src = offscreen.toDataURL('image/jpeg', 0.85); });
        const occProb = tf.tidy(() => classifier.predict(mobileNetModel.infer(tempImg, true)).dataSync()[1]);
        scores.push(baseProb - occProb); await tf.nextFrame();
      }
      return { scores, gridSize };
    }
    function renderHeatmap(img, occResult) {
      const { scores, gridSize } = occResult, canvas = document.getElementById('heatmap-canvas');
      const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, w, h);
      const cellW = w/gridSize, cellH = h/gridSize, maxPos = Math.max(...scores.map(s => Math.max(0, s)), 0.001);
      scores.forEach((score, i) => {
        if (score <= 0) return;
        const t = score / maxPos, green = Math.round(80 + (1 - t) * 130);
        ctx.fillStyle = `rgba(255, ${green}, 40, ${0.35 + t * 0.55})`;
        ctx.fillRect((i%gridSize)*cellW, Math.floor(i/gridSize)*cellH, cellW, cellH);
      });
      const top1 = scores.map((s,i) => ({s,i})).sort((a,b) => b.s - a.s)[0];
      if (top1 && top1.s > 0) {
        const cx = ((top1.i%gridSize)+0.5)*cellW, cy = (Math.floor(top1.i/gridSize)+0.5)*cellH, r = Math.min(cellW, cellH)*0.46;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.96)'; ctx.fill();
        ctx.lineWidth = Math.max(3, r*0.16); ctx.strokeStyle = '#ff4040'; ctx.stroke();
        ctx.fillStyle = '#ff4040'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${Math.round(r*1.3)}px sans-serif`; ctx.fillText('1', cx, cy + r*0.05);
      }
    }
    function toggleHeatmap() {
      heatmapVisible = !heatmapVisible;
      document.getElementById('heatmap-canvas').style.display = heatmapVisible ? 'block' : 'none';
      document.getElementById('toggle-heatmap').textContent = heatmapVisible ? L('hideMap') : L('showMap');
    }

    let _brainDraw = null;
    let brainNodes = []; // ホバー判定用 {x,y,r,label}
    function onBrainHover(e) {
      const tip = document.getElementById('brain-tip');
      let hit = null;
      for (const n of brainNodes) { const dx = e.offsetX - n.x, dy = e.offsetY - n.y; if (dx*dx + dy*dy < (n.r + 5) * (n.r + 5)) { hit = n; break; } }
      if (hit) { tip.textContent = hit.label; tip.style.left = hit.x + 'px'; tip.style.top = (hit.y - hit.r - 6) + 'px'; tip.style.display = 'block'; document.getElementById('brain-canvas').style.cursor = 'pointer'; }
      else { tip.style.display = 'none'; document.getElementById('brain-canvas').style.cursor = 'default'; }
    }
    function animateBrain(drawFn) {
      cancelAnimationFrame(brainRAF); _brainDraw = drawFn;
      const t0 = performance.now();
      (function loop(now) { if (_brainDraw !== drawFn) return; drawFn((now - t0) / 1000); brainRAF = requestAnimationFrame(loop); })(t0);
    }
    function brainCtx() {
      const section = document.getElementById('brain-section'); section.style.display = 'block';
      const canvas = document.getElementById('brain-canvas');
      const W = canvas.width = canvas.offsetWidth || 380, H = canvas.height = 210;
      return { ctx: canvas.getContext('2d'), W, H };
    }
    function drawNode(ctx, p, r, fill, ring) { ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fillStyle = fill; ctx.fill(); if (ring) { ctx.lineWidth = 2.5; ctx.strokeStyle = '#ff7a8a'; ctx.stroke(); } }
    function drawPulse(ctx, a, b, phase) { const x = a.x + (b.x - a.x) * phase, y = a.y + (b.y - a.y) * phase; ctx.beginPath(); ctx.arc(x, y, 2.4, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill(); }
    function renderBrainFeature(vec, prob, effPct) {
      document.getElementById('brain-note-overlay').style.display = 'none';
      document.getElementById('brain-title').textContent = L('brainTitleB');
      document.getElementById('brain-cap').textContent = L('brainCapB');
      const Wt = featClassifier.getWeights(), W1 = Wt[0].arraySync(), b1 = Wt[1].arraySync(), W2 = Wt[2].arraySync(), H1 = b1.length;
      const hidden = b1.map((bj, j) => Math.max(0, vec.reduce((s, v, i) => s + v * W1[i][j], 0) + bj));
      const maxH = Math.max(...hidden, 0.001);
      let maxW1 = 0.001; for (const r of W1) for (const w of r) maxW1 = Math.max(maxW1, Math.abs(w));
      let maxW2 = 0.001; for (const r of W2) maxW2 = Math.max(maxW2, Math.abs(r[1]));
      const strongAxis = effPct.indexOf(Math.max(...effPct)), ICON = AXES.map(a => a.icon);
      animateBrain((t) => {
        const { ctx, W, H } = brainCtx(); ctx.clearRect(0, 0, W, H);
        const pad = 24, xIn = W*0.12, xMid = W*0.5, xOut = W*0.88, yAt = (i,n) => pad + i*(H-2*pad)/Math.max(1,n-1), inN = vec.length;
        const inPos = vec.map((_, i) => ({ x:xIn, y:yAt(i,inN) })), midPos = hidden.map((_, j) => ({ x:xMid, y:yAt(j,H1) })), outPos = { x:xOut, y:H/2 };
        const pulse = (t % 1.6) / 1.6;
        for (let i = 0; i < inN; i++) for (let j = 0; j < H1; j++) {
          const w = W1[i][j], a = Math.abs(w)/maxW1;
          ctx.strokeStyle = (w>=0?'rgba(255,122,138,':'rgba(94,197,255,')+(0.06+a*0.4)+')'; ctx.lineWidth = 0.5+a*2.2;
          ctx.beginPath(); ctx.moveTo(inPos[i].x, inPos[i].y); ctx.lineTo(midPos[j].x, midPos[j].y); ctx.stroke();
        }
        for (let j = 0; j < H1; j++) {
          const w = W2[j][1], a = Math.abs(w)/maxW2;
          ctx.strokeStyle = (w>=0?'rgba(255,122,138,':'rgba(94,197,255,')+(0.06+a*0.4)+')'; ctx.lineWidth = 0.5+a*2.2;
          ctx.beginPath(); ctx.moveTo(midPos[j].x, midPos[j].y); ctx.lineTo(outPos.x, outPos.y); ctx.stroke();
        }
        if (strongAxis >= 0) for (let j = 0; j < H1; j++) { drawPulse(ctx, inPos[strongAxis], midPos[j], pulse); drawPulse(ctx, midPos[j], outPos, pulse); }
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        inPos.forEach((p, i) => { drawNode(ctx, p, 12, `rgba(79,209,181,${0.3+Math.min(1,vec[i])*0.7})`, i===strongAxis); ctx.font='12px sans-serif'; ctx.fillText(ICON[i], p.x, p.y); });
        midPos.forEach((p, j) => drawNode(ctx, p, 7, `rgba(183,148,246,${0.2+(hidden[j]/maxH)*0.8})`, false));
        drawNode(ctx, outPos, 17, `rgba(255,122,138,${0.3+prob*0.7})`, true); ctx.font='17px sans-serif'; ctx.fillText('🐟', outPos.x, outPos.y);
        brainNodes = [];
        inPos.forEach((p, i) => brainNodes.push({ x:p.x, y:p.y, r:12, label: L('ndAxis') + AXES[i][curLang] }));
        midPos.forEach(p => brainNodes.push({ x:p.x, y:p.y, r:7, label: L('ndHidden') }));
        brainNodes.push({ x:outPos.x, y:outPos.y, r:17, label: L('ndOut') });
      });
    }
    function renderBrainBlackbox(prob) {
      document.getElementById('brain-title').textContent = L('brainTitleA');
      document.getElementById('brain-cap').textContent = L('brainCapA');
      const ov = document.getElementById('brain-note-overlay'); ov.textContent = L('note'); ov.style.display = 'block';
      const cloud = [];
      for (let k = 0; k < 40; k++) cloud.push({ rx:0.30+Math.random()*0.40, ry:0.10+Math.random()*0.80, r:2+Math.random()*4, ph:Math.random()*6.28 });
      animateBrain((t) => {
        const { ctx, W, H } = brainCtx(); ctx.clearRect(0, 0, W, H);
        const inP = { x:W*0.1, y:H/2 }, outP = { x:W*0.9, y:H/2 };
        cloud.forEach(c => { const a = 0.16 + 0.12*Math.sin(t*1.6 + c.ph); ctx.beginPath(); ctx.arc(c.rx*W, c.ry*H, c.r, 0, Math.PI*2); ctx.fillStyle = `rgba(138,147,171,${a})`; ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(138,147,171,0.4)'; ctx.fill(); });
        ctx.shadowBlur = 0; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        drawNode(ctx, inP, 15, 'rgba(94,197,255,0.85)', false); ctx.font='14px sans-serif'; ctx.fillText('🖼️', inP.x, inP.y);
        drawNode(ctx, outP, 17, `rgba(255,122,138,${0.3+prob*0.7})`, true); ctx.font='17px sans-serif'; ctx.fillText('🐟', outP.x, outP.y);
        ctx.fillStyle = 'rgba(138,147,171,0.5)'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('?', W*0.5, H*0.5);
        brainNodes = [{ x:inP.x, y:inP.y, r:15, label:L('ndImg') }, { x:outP.x, y:outP.y, r:17, label:L('ndOut') }];
      });
    }

    function reset() {
      cancelAnimationFrame(brainRAF); _brainDraw = null; resultShown = false; last = null;
      ['preview-wrap','result','heatmap-info','judge-card','brain-section'].forEach(id => { document.getElementById(id).style.display = 'none'; });
      document.getElementById('heatmap-canvas').style.display = 'none';
      document.getElementById('judge-btn').style.display = 'none';
      document.getElementById('upload-area').style.display = 'block';
      document.getElementById('analysis-hint').style.display = 'block';
      document.getElementById('file-input').value = '';
      setStatus(L('stReady'));
    }

    function setStatus(msg) { const el = document.getElementById('status'); el.innerHTML = msg === L('stLoading') ? msg + '<span class="loading-dots"></span>' : msg; }

    applyLang();
    if (localStorage.getItem('judge-welcomed')) document.getElementById('welcome').classList.add('hide');
    const _bc = document.getElementById('brain-canvas');
    _bc.addEventListener('mousemove', onBrainHover);
    _bc.addEventListener('mouseleave', () => { document.getElementById('brain-tip').style.display = 'none'; _bc.style.cursor = 'default'; });
    setupNavLink();
    setupUpload();
    loadModel();
  </script>
